reimport_all_history:
  name: Re-import all history
  description: >
    Re-imports every quarter where both a BFE publication and user's export LTS exist.
    Useful for first-run backfill.

refresh_data:
  name: Refresh prices & tariff data
  description: >
    Force-poll BFE for new reference market prices AND fetch the latest
    tariffs.json from the companion repo (https://github.com/v3DJG6GL/bfe-tariffs-data).
    Skips the 6-hour BFE tick and the daily tariff cache. Auto-imports any
    quarter BFE has published since the last successful poll. Renamed from
    'refresh' in v0.9.6.

refresh_tariffs:
  name: Refresh tariff database (only)
  description: >
    Power-user knob — force-fetch tariffs.json from the companion repo without
    polling BFE. Falls back to the bundled file silently on any error (network
    or schema). For most cases prefer refresh_data which does both.

get_breakdown:
  name: Get tariff breakdown
  description: >
    Returns the structured tariff breakdown as a JSON object. Used by the
    BFE tariff analysis Lovelace card. Read-only — does NOT trigger LTS
    rewrites. Quarter precedence: last_n_quarters > from_year/from_quarter
    range > year+quarter > year only > quarter only > current quarter.
  fields:
    granularity:
      name: Granularity (chart history view)
      description: >
        Optional. When set, returns rows aggregated at the requested
        granularity. Falls back to recompute-from-hour-record for
        finer-than-snapshot grains (tag, stunde, and monat for
        quartal-billed utilities). Per-granularity quarter caps apply;
        truncation surfaces as `truncated_to_quarters` in the response.
      example: quartal
      selector:
        select:
          options:
            - value: jahr
              label: Jahr
            - value: quartal
              label: Quartal
            - value: monat
              label: Monat
            - value: tag
              label: Tag
            - value: stunde
              label: Stunde
    last_n_quarters:
      name: Last N quarters (history)
      description: >
        If set, returns the most recent N quarters (oldest first). Used by
        the chart history view. Overrides year + quarter and from/to range.
      example: 8
      selector:
        number:
          min: 1
          max: 40
          mode: box
    from_year:
      name: From year (range start)
      example: 2024
      selector:
        number:
          min: 2020
          max: 2099
          mode: box
    from_quarter:
      name: From quarter (1-4)
      example: 1
      selector:
        number:
          min: 1
          max: 4
          mode: box
    to_year:
      name: To year (range end)
      example: 2026
      selector:
        number:
          min: 2020
          max: 2099
          mode: box
    to_quarter:
      name: To quarter (1-4)
      example: 4
      selector:
        number:
          min: 1
          max: 4
          mode: box
    year:
      name: Year (single quarter)
      example: 2026
      selector:
        number:
          min: 2020
          max: 2099
          mode: box
    quarter:
      name: Quarter (1-4, single)
      example: 2
      selector:
        number:
          min: 1
          max: 4
          mode: box

show_report:
  name: Show tariff report
  description: >
    Builds the same markdown report as 'reimport_all_history' but without
    rewriting LTS — pure diagnostic dump emitted as a persistent
    notification. Useful for sanity-checking a quarter's breakdown
    without touching imports.
  fields:
    year:
      name: Year
      selector:
        number:
          min: 2020
          max: 2099
          mode: box
    quarter:
      name: Quarter (1-4)
      selector:
        number:
          min: 1
          max: 4
          mode: box
