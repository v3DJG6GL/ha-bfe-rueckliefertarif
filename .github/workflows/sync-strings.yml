name: Sync user_input strings

# Auto-run scripts/sync_user_input_slugs.py whenever bundled tariffs.json
# changes. If the script populates new slug entries, commit them back to
# the same branch so strings.json + translations stay in lock-step with
# the bundled data — no manual editing required when bfe-tariffs-data
# ships a new user_input slug.

on:
  push:
    branches: [main]
    paths:
      - "custom_components/bfe_rueckliefertarif/data/tariffs.json"
      - "scripts/sync_user_input_slugs.py"
  pull_request:
    paths:
      - "custom_components/bfe_rueckliefertarif/data/tariffs.json"
      - "scripts/sync_user_input_slugs.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run sync script
        run: python3 scripts/sync_user_input_slugs.py || true
      - name: Commit any drift
        run: |
          if git diff --quiet; then
            echo "No drift detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/bfe_rueckliefertarif/strings.json \
                  custom_components/bfe_rueckliefertarif/translations/de.json \
                  custom_components/bfe_rueckliefertarif/translations/en.json \
                  custom_components/bfe_rueckliefertarif/translations/fr.json
          git commit -m "chore: sync user_input slug strings (auto)"
          git push
