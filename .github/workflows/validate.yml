name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # weekly, catches HA upstream changes

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # 3.13 because pytest-homeassistant-custom-component releases that
          # bundle HA >= 2024.11 (needed for OptionsFlowWithReload) and
          # match HACS's HA min (2025.1.0) only have 3.13+ wheels. On 3.12
          # pip falls back to the pre-2024.11 0.13.205 release.
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -v

  strings-en-sync:
    # strings.json is the developer source-of-truth and HA core's Lokalise input.
    # translations/en.json is what HA actually reads at runtime for English.
    # Custom integrations don't have Lokalise — keep them byte-identical manually.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: strings.json must equal translations/en.json
        run: diff -u custom_components/bfe_rueckliefertarif/strings.json custom_components/bfe_rueckliefertarif/translations/en.json

  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # brands: submit to home-assistant/brands before HACS default-repo submission.
          ignore: brands
